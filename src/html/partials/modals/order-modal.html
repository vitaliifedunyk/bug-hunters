<div class="backdrop is-hidden" data-order-modal>
  <div class="modal">
    <button
      type="button"
      class="modal__close"
      data-order-modal-close
      aria-label="Close modal"
    >
      <svg width="24" height="24">
        <use href="./images/icons/icons.svg#icon-close"></use>
      </svg>
    </button>

    <p class="modal__title">Замовити</p>

    <form class="form js-order-form">
      <div class="form-field">
        <label for="user-name" class="form-label">Ім'я*</label>
        <input
          type="text"
          name="user-name"
          id="user-name"
          class="form-input"
          placeholder="Дмитро"
          required
        />
      </div>

      <div class="form-field">
        <label for="user-tel" class="form-label">Телефон*</label>
        <input
          type="tel"
          name="user-tel"
          id="user-tel"
          class="form-input"
          placeholder="38 099 123 22 11"
          required
        />
      </div>

      <div class="form-field">
        <label for="user-comment" class="form-label">Коментар</label>
        <textarea
          name="user-comment"
          id="user-comment"
          class="form-textarea"
          placeholder="Введіть ваш коментар"
        ></textarea>
      </div>

      <button type="submit" class="button button--primary form-submit">
        Надіслати заявку
      </button>
    </form>
  </div>
</div>
