<div class="backdrop is-hidden" data-product-modal>
  <div class="modal modal--product">
    <button type="button" class="modal__close" data-product-modal-close>
      <svg width="24" height="24">
        <use href="./images/icons/icons.svg#icon-close"></use>
      </svg>
    </button>

    <div class="product-info">
      <img
        src="./images/products/oslo-sofa.jpg"
        alt="Sofa Oslo"
        class="product-info__img"
      />

      <div class="product-info__content">
        <h2 class="product-info__title">Sofa Oslo</h2>
        <p class="product-info__category">Категорія: Дивани</p>
        <p class="product-info__price">9999 грн</p>
        <p class="product-info__description">
          Сучасний та комфортний диван, який ідеально впишеться у ваш інтер'єр.
        </p>
        <button
          type="button"
          class="button button--primary"
          data-order-modal-open-from-product
        >
          Перейти до замовлення
        </button>
      </div>
    </div>
  </div>
</div>
