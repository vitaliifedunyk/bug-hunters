<div class="product-modal-overlay is-hidden" data-product-modal aria-hidden="true">
  <div class="product-modal" role="dialog" aria-modal="true" aria-labelledby="product-modal-title">
    <button class="product-modal__close" type="button" data-product-modal-close aria-label="Закрити">
      <svg class="product-modal__close-icon" width="24" height="24">
        <use href="/src/images/icons/icons.svg#icon-x"></use>
      </svg>
    </button>

    <div class="product-modal__content">
      <div class="product-modal__gallery">
        <div class="product-modal__main-image">
          <img src="" alt="" data-product-modal-main-image />
        </div>

        <div class="product-modal__thumbnails" data-product-modal-thumbnails></div>
      </div>

      <div class="product-modal__info">
        <h2 class="product-modal__title" id="product-modal-title" data-product-modal-title></h2>
        <p class="product-modal__category" data-product-modal-category></p>

        <div class="product-modal__price-rating">
          <p class="product-modal__price" data-product-modal-price></p>
          <div class="product-modal__rating">
            <div class="stars" data-product-modal-rating></div>
          </div>
        </div>

        <div class="product-modal__colors">
          <p class="product-modal__label">Колір</p>
          <div class="product-modal__color-options" data-product-modal-colors></div>
        </div>

        <div class="product-modal__description">
          <p data-product-modal-description></p>
        </div>

        <div class="product-modal__dimensions">
          <p>Розміри: <span data-product-modal-sizes></span></p>
        </div>

        <button class="btn btn--primary btn--product-order" type="button" data-product-modal-order>
          Перейти до замовлення
        </button>
      </div>
    </div>
  </div>
</div>
